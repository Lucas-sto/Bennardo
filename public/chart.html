<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chart Viewer - EyeTracking Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <!-- ── Header ─────────────────────────────────────────────────────────── -->
    <header class="header">
      <div class="header__inner">
        <div class="header__logo">
          <svg class="header__eye" viewBox="0 0 64 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="32" cy="20" rx="30" ry="18" stroke="#4F81BD" stroke-width="3"/>
            <circle cx="32" cy="20" r="10" fill="#4F81BD"/>
            <circle cx="28" cy="16" r="3.5" fill="#ffffff"/>
          </svg>
          <div class="header__title-group">
            <h1 class="header__title">EyeTracking Dashboard</h1>
            <span class="header__subtitle">Interactive Chart Viewer</span>
          </div>
        </div>
        <a href="index.html" class="btn btn--outline btn--small">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Back to Dashboard
        </a>
      </div>
    </header>

    <!-- ── Main ───────────────────────────────────────────────────────────── -->
    <main class="main chart-viewer-main">

      <!-- Chart container -->
      <section class="card chart-viewer-card">
        <div class="chart-viewer-header">
          <div>
            <h2 class="chart-viewer-title" id="chartTitle">Loading Chart...</h2>
            <p class="chart-viewer-subtitle" id="chartSubtitle"></p>
          </div>
        </div>

        <!-- Canvas for charts -->
        <div class="chart-canvas-wrapper" id="chartCanvasWrapper">
          <canvas id="chartCanvas"></canvas>
        </div>

        <!-- Table container (for table-type data) -->
        <div class="chart-table-wrapper" id="chartTableWrapper" hidden>
          <table class="data-table" id="chartTable"></table>
        </div>

        <!-- Error message -->
        <div class="chart-error" id="chartError" hidden>
          <svg class="icon icon--large" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <p>Unable to load chart data. Please upload a CSV file first.</p>
          <a href="index.html" class="btn btn--primary">Go to Dashboard</a>
        </div>
      </section>

    </main>

    <!-- ── Footer ─────────────────────────────────────────────────────────── -->
    <footer class="footer">
      <p>EyeTracking Dashboard for Shopping Advisors &nbsp;·&nbsp; Interactive Chart Viewer</p>
    </footer>

    <script src="chart-viewer.js"></script>
  </body>
</html>
